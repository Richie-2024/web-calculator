<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Calculator Dashboard</title>

  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

  <style>
    :root {
      --bg: #f5f7fb;
      --surface: #ffffff;
      --surface-2: #f8fafc;
      --text: #0f172a;
      --muted: #64748b;
      --line: #e2e8f0;
      --primary: #2563eb;
      --primary-hover: #1d4ed8;
      --success: #16a34a;
      --danger: #dc2626;
      --shadow: 0 8px 30px rgba(15, 23, 42, 0.06);
      --radius-xl: 24px;
      --radius-lg: 18px;
      --radius-md: 14px;
      --radius-sm: 10px;
      --transition: 0.2s ease;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      min-height: 100%;
    }

    body {
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: linear-gradient(180deg, #f8fafc 0%, #f1f5f9 100%);
      color: var(--text);
      padding: 24px;
    }

    button, input {
      font: inherit;
    }

    .app {
      max-width: 1150px;
      margin: 0 auto;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      margin-bottom: 24px;
      padding: 18px 22px;
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow);
    }

    .brand h1 {
      font-size: 1.4rem;
      margin-bottom: 4px;
    }

    .brand p {
      color: var(--muted);
      font-size: 0.95rem;
    }

    .topbar-right {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .user-badge {
      padding: 10px 14px;
      background: var(--surface-2);
      border: 1px solid var(--line);
      border-radius: 999px;
      color: var(--muted);
      font-size: 0.92rem;
      max-width: 260px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .btn {
      border: 1px solid var(--line);
      background: var(--surface);
      color: var(--text);
      cursor: pointer;
      transition: var(--transition);
      border-radius: var(--radius-md);
    }

    .btn:hover {
      background: #f8fafc;
    }

    .btn-primary {
      background: var(--primary);
      border-color: var(--primary);
      color: white;
    }

    .btn-primary:hover {
      background: var(--primary-hover);
      border-color: var(--primary-hover);
    }

    .btn-danger {
      color: var(--danger);
      background: #fff;
    }

    .layout {
      display: grid;
      grid-template-columns: minmax(0, 1.45fr) minmax(320px, 0.85fr);
      gap: 24px;
      align-items: start;
    }

    .panel {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow);
    }

    .calculator-panel {
      padding: 24px;
    }

    .sidebar {
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    .display-box {
      padding: 18px;
      background: var(--surface-2);
      border: 1px solid var(--line);
      border-radius: var(--radius-lg);
      margin-bottom: 18px;
    }

    .display-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 14px;
      flex-wrap: wrap;
    }

    .label {
      font-size: 0.82rem;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .memory-tag {
      padding: 7px 12px;
      border-radius: 999px;
      background: white;
      border: 1px solid var(--line);
      color: var(--muted);
      font-size: 0.85rem;
      font-weight: 600;
    }

    .calc-input {
      width: 100%;
      padding: 16px 18px;
      border-radius: var(--radius-md);
      border: 1px solid var(--line);
      background: white;
      font-size: 1.1rem;
      outline: none;
      margin-bottom: 12px;
    }

    .calc-input:focus {
      border-color: #93c5fd;
      box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.08);
    }

    .result-box {
      min-height: 72px;
      padding: 14px 16px;
      border-radius: var(--radius-md);
      border: 1px solid var(--line);
      background: white;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 6px;
    }

    .result {
      font-size: 1.7rem;
      font-weight: 700;
      color: var(--success);
      word-break: break-word;
    }

    .result.error {
      color: var(--danger);
    }

    .keypad {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 12px;
      margin-bottom: 14px;
    }

    .key {
      min-height: 60px;
      border-radius: var(--radius-md);
      font-weight: 600;
      font-size: 1rem;
    }

    .key.operator {
      color: var(--primary);
      background: #f8fbff;
    }

    .key.function {
      color: #0f766e;
      background: #f6fffb;
    }

    .key.zero {
      grid-column: span 2;
    }

    .utility-row,
    .action-row {
      display: grid;
      gap: 12px;
    }

    .utility-row {
      grid-template-columns: repeat(5, minmax(0, 1fr));
      margin-bottom: 14px;
    }

    .action-row {
      grid-template-columns: 1.3fr 1fr 1fr 1fr;
    }

    .utility-btn,
    .action-btn {
      min-height: 54px;
      border-radius: var(--radius-md);
      font-weight: 600;
    }

    .sidebar-card {
      padding: 18px;
    }

    .section-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 14px;
      flex-wrap: wrap;
    }

    .section-title h2 {
      font-size: 1rem;
      margin-bottom: 4px;
    }

    .section-title p {
      color: var(--muted);
      font-size: 0.9rem;
    }

    .pill-btn {
      padding: 10px 14px;
      border-radius: 999px;
      font-size: 0.9rem;
      font-weight: 600;
    }

    .list {
      display: flex;
      flex-direction: column;
      gap: 10px;
      max-height: 360px;
      overflow-y: auto;
      padding-right: 4px;
    }

    .empty {
      padding: 18px;
      border: 1px dashed var(--line);
      border-radius: var(--radius-md);
      color: var(--muted);
      text-align: center;
      background: #fcfdff;
    }

    .history-item,
    .saved-item {
      padding: 14px;
      border: 1px solid var(--line);
      border-radius: var(--radius-md);
      background: #fff;
    }

    .history-btn {
      width: 100%;
      background: none;
      border: none;
      text-align: left;
      cursor: pointer;
      color: inherit;
    }

    .history-expression {
      font-weight: 600;
      word-break: break-word;
    }

    .history-result {
      margin-top: 6px;
      color: var(--success);
      font-size: 0.92rem;
      font-weight: 600;
    }

    .saved-top {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: start;
    }

    .saved-info {
      flex: 1;
      min-width: 0;
    }

    .saved-title {
      font-weight: 700;
      margin-bottom: 5px;
      word-break: break-word;
    }

    .saved-date,
    .saved-count {
      color: var(--muted);
      font-size: 0.88rem;
    }

    .saved-actions {
      display: flex;
      gap: 8px;
      flex-shrink: 0;
    }

    .mini-btn {
      min-height: 38px;
      min-width: 72px;
      padding: 0 12px;
      border-radius: var(--radius-sm);
      font-size: 0.88rem;
      font-weight: 600;
    }

    .modal {
      position: fixed;
      inset: 0;
      background: rgba(15, 23, 42, 0.35);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 20px;
      z-index: 1000;
    }

    .modal.open {
      display: flex;
    }

    .modal-card {
      width: min(100%, 420px);
      background: white;
      border-radius: var(--radius-xl);
      padding: 22px;
      border: 1px solid var(--line);
      box-shadow: 0 18px 40px rgba(15, 23, 42, 0.12);
    }

    .modal-card h3 {
      margin-bottom: 8px;
    }

    .modal-card p {
      color: var(--muted);
      margin-bottom: 14px;
      line-height: 1.5;
    }

    .modal-input {
      width: 100%;
      min-height: 50px;
      padding: 0 14px;
      border-radius: var(--radius-md);
      border: 1px solid var(--line);
      outline: none;
      margin-bottom: 14px;
    }

    .modal-input:focus {
      border-color: #93c5fd;
      box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.08);
    }

    .modal-actions {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
    }

    .toast-wrap {
      position: fixed;
      right: 18px;
      bottom: 18px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      z-index: 1100;
    }

    .toast {
      min-width: 260px;
      max-width: 380px;
      padding: 14px 16px;
      border-radius: 14px;
      color: white;
      font-size: 0.95rem;
      box-shadow: 0 14px 26px rgba(15, 23, 42, 0.12);
    }

    .toast.info { background: #334155; }
    .toast.success { background: #15803d; }
    .toast.error { background: #b91c1c; }

    @media (max-width: 960px) {
      .layout {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 640px) {
      body {
        padding: 14px;
      }

      .topbar {
        flex-direction: column;
        align-items: stretch;
      }

      .topbar-right {
        flex-direction: column;
        align-items: stretch;
      }

      .user-badge {
        max-width: 100%;
      }

      .calculator-panel,
      .sidebar-card {
        padding: 16px;
      }

      .keypad {
        grid-template-columns: repeat(4, minmax(0, 1fr));
      }

      .utility-row {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }

      .action-row {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .action-row .btn-primary {
        grid-column: span 2;
      }

      .saved-top {
        flex-direction: column;
      }

      .saved-actions {
        width: 100%;
      }

      .saved-actions .mini-btn {
        flex: 1;
      }

      .modal-actions {
        flex-direction: column-reverse;
      }

      .modal-actions .btn {
        width: 100%;
      }

      .toast-wrap {
        left: 14px;
        right: 14px;
        bottom: 14px;
      }

      .toast {
        min-width: auto;
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="brand">
        <h1>Calculator Dashboard</h1>
        <p>Simple, clean, and responsive</p>
      </div>

      <div class="topbar-right">
        <div class="user-badge" id="userEmailDisplay">Loading...</div>
        <button id="logoutBtn" class="btn pill-btn" type="button">Sign out</button>
      </div>
    </header>

    <main class="layout">
      <section class="panel calculator-panel">
        <div class="display-box">
          <div class="display-head">
            <span class="label">Calculator</span>
            <div class="memory-tag" id="memoryBadge">Memory: 0</div>
          </div>

          <input
            id="calcInput"
            class="calc-input"
            type="text"
            placeholder="Enter expression..."
            autocomplete="off"
            autofocus
          />

          <div class="result-box">
            <span class="label">Result</span>
            <div id="result" class="result">0</div>
          </div>
        </div>

        <div class="keypad" id="keypad">
          <button class="btn key" data-value="7" type="button">7</button>
          <button class="btn key" data-value="8" type="button">8</button>
          <button class="btn key" data-value="9" type="button">9</button>
          <button class="btn key operator" data-value="/" type="button">÷</button>
          <button class="btn key function" data-func="sqrt" type="button">√</button>

          <button class="btn key" data-value="4" type="button">4</button>
          <button class="btn key" data-value="5" type="button">5</button>
          <button class="btn key" data-value="6" type="button">6</button>
          <button class="btn key operator" data-value="*" type="button">×</button>
          <button class="btn key function" data-func="power" type="button">^</button>

          <button class="btn key" data-value="1" type="button">1</button>
          <button class="btn key" data-value="2" type="button">2</button>
          <button class="btn key" data-value="3" type="button">3</button>
          <button class="btn key operator" data-value="-" type="button">−</button>
          <button class="btn key function" data-value="%" type="button">%</button>

          <button class="btn key zero" data-value="0" type="button">0</button>
          <button class="btn key" data-value="." type="button">.</button>
          <button class="btn key" data-value="(" type="button">(</button>
          <button class="btn key" data-value=")" type="button">)</button>

          <button class="btn key operator" data-value="+" type="button">+</button>
        </div>

        <div class="utility-row">
          <button class="btn utility-btn" data-action="memory-add" type="button">M+</button>
          <button class="btn utility-btn" data-action="memory-subtract" type="button">M-</button>
          <button class="btn utility-btn" data-action="memory-recall" type="button">MR</button>
          <button class="btn utility-btn" data-action="memory-clear" type="button">MC</button>
          <button class="btn utility-btn" data-action="backspace" type="button">⌫</button>
        </div>

        <div class="action-row">
          <button id="calculateBtn" class="btn action-btn btn-primary" type="button">Calculate</button>
          <button class="btn action-btn" data-action="clear-entry" type="button">C</button>
          <button class="btn action-btn btn-danger" data-action="all-clear" type="button">AC</button>
          <button id="openSaveModalBtn" class="btn action-btn" type="button">Save</button>
        </div>
      </section>

      <aside class="sidebar">
        <section class="panel sidebar-card">
          <div class="section-head">
            <div class="section-title">
              <h2>Recent calculations</h2>
              <p>Click any item to reuse it</p>
            </div>
          </div>
          <div id="history" class="list">
            <div class="empty">No calculations yet.</div>
          </div>
        </section>

        <section class="panel sidebar-card">
          <div class="section-head">
            <div class="section-title">
              <h2>Saved histories</h2>
              <p>Stored in your account</p>
            </div>
          </div>
          <div id="savedList" class="list">
            <div class="empty">Loading saved histories...</div>
          </div>
        </section>
      </aside>
    </main>
  </div>

  <div id="saveModal" class="modal">
    <div class="modal-card">
      <h3>Save history</h3>
      <p>Enter a title for this calculation history.</p>
      <input
        id="historyTitle"
        class="modal-input"
        type="text"
        placeholder="e.g. Budget, Homework, Measurements"
      />
      <div class="modal-actions">
        <button id="modalCancelBtn" class="btn" type="button">Cancel</button>
        <button id="modalConfirmBtn" class="btn btn-primary" type="button">Save</button>
      </div>
    </div>
  </div>

  <div id="toastWrap" class="toast-wrap"></div>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyACtt9csZKS2a-PaVbOSDRNC-6xh-nJUz0",
      authDomain: "calculator-4cd6b.firebaseapp.com",
      projectId: "calculator-4cd6b",
      appId: "1:648117773768:web:237871d1f5ed550fcf8cfd"
    };

    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);

    const auth = firebase.auth();
    const db = firebase.firestore();

    db.enablePersistence().catch(err => {
      console.warn("Persistence not enabled:", err?.message || err);
    });

    const els = {
      userEmailDisplay: document.getElementById("userEmailDisplay"),
      logoutBtn: document.getElementById("logoutBtn"),
      calcInput: document.getElementById("calcInput"),
      result: document.getElementById("result"),
      memoryBadge: document.getElementById("memoryBadge"),
      keypad: document.getElementById("keypad"),
      calculateBtn: document.getElementById("calculateBtn"),
      history: document.getElementById("history"),
      savedList: document.getElementById("savedList"),
      saveModal: document.getElementById("saveModal"),
      openSaveModalBtn: document.getElementById("openSaveModalBtn"),
      historyTitle: document.getElementById("historyTitle"),
      modalCancelBtn: document.getElementById("modalCancelBtn"),
      modalConfirmBtn: document.getElementById("modalConfirmBtn"),
      toastWrap: document.getElementById("toastWrap")
    };

    let currentUser = null;
    let memory = 0;
    let history = [];

    function escapeHtml(str = "") {
      return String(str)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");
    }

    function showToast(message, type = "info") {
      const toast = document.createElement("div");
      toast.className = `toast ${type}`;
      toast.textContent = message;
      els.toastWrap.appendChild(toast);

      setTimeout(() => {
        toast.style.opacity = "0";
        toast.style.transform = "translateY(8px)";
        toast.style.transition = "all .2s ease";
      }, 2500);

      setTimeout(() => toast.remove(), 2800);
    }

    function formatNumber(value) {
      if (!Number.isFinite(Number(value))) return "0";
      const n = Number(value);
      return Number.isInteger(n) ? String(n) : String(Number(n.toPrecision(12)));
    }

    function setResult(value, isError = false) {
      els.result.textContent = value;
      els.result.classList.toggle("error", isError);
    }

    function updateMemoryBadge() {
      els.memoryBadge.textContent = `Memory: ${formatNumber(memory)}`;
    }

    function appendValue(value) {
      els.calcInput.value += value;
      updatePreview();
      els.calcInput.focus();
    }

    function backspace() {
      els.calcInput.value = els.calcInput.value.slice(0, -1);
      updatePreview();
    }

    function clearEntry() {
      els.calcInput.value = "";
      updatePreview();
      els.calcInput.focus();
    }

    function allClear() {
      els.calcInput.value = "";
      setResult("0");
      els.calcInput.focus();
    }

    function insertFunction(type) {
      if (type === "sqrt") appendValue("√(");
      if (type === "power") appendValue("^");
    }

    function normalizeExpression(expr) {
      const compact = String(expr).replace(/\s+/g, "");
      if (!compact) return "";

      if (!/^[0-9+\-*/^%().√]+$/.test(compact)) {
        throw new Error("Invalid characters");
      }

      return compact
        .replace(/√/g, "Math.sqrt")
        .replace(/\^/g, "**")
        .replace(/%/g, "/100");
    }

    function evaluateExpression(expr) {
      const processed = normalizeExpression(expr);
      if (!processed) return "";

      const value = Function(`"use strict"; return (${processed})`)();
      if (!Number.isFinite(value)) throw new Error("Invalid result");
      return Number(value.toPrecision(12));
    }

    function updatePreview() {
      const expr = els.calcInput.value.trim();
      if (!expr) {
        setResult("0");
        return;
      }

      try {
        const value = evaluateExpression(expr);
        setResult(formatNumber(value));
      } catch {
        setResult("...");
        els.result.classList.remove("error");
      }
    }

    function calculate() {
      const expr = els.calcInput.value.trim();
      if (!expr) {
        setResult("0");
        return;
      }

      try {
        const value = evaluateExpression(expr);
        const formatted = formatNumber(value);
        setResult(formatted);
        history.unshift(`${expr} = ${formatted}`);
        history = history.slice(0, 50);
        renderHistory();
      } catch (err) {
        console.warn(err);
        setResult("Error", true);
        showToast("Invalid expression.", "error");
      }
    }

    function parseHistoryItem(item) {
      const [expression, ...rest] = String(item).split(" = ");
      return {
        expression: expression || "",
        result: rest.join(" = ") || ""
      };
    }

    function renderHistory() {
      if (!history.length) {
        els.history.innerHTML = `<div class="empty">No calculations yet.</div>`;
        return;
      }

      els.history.innerHTML = history.map((item, index) => {
        const parsed = parseHistoryItem(item);
        return `
          <div class="history-item">
            <button class="history-btn" type="button" data-history-index="${index}">
              <div class="history-expression">${escapeHtml(parsed.expression)}</div>
              <div class="history-result">= ${escapeHtml(parsed.result)}</div>
            </button>
          </div>
        `;
      }).join("");
    }

    function formatFirestoreDate(timestamp) {
      if (!timestamp || !timestamp.toDate) return "Saved just now";
      return timestamp.toDate().toLocaleString([], {
        dateStyle: "medium",
        timeStyle: "short"
      });
    }

    function openModal() {
      if (!history.length) {
        showToast("Nothing to save yet.", "info");
        return;
      }
      els.historyTitle.value = "";
      els.saveModal.classList.add("open");
      document.body.style.overflow = "hidden";
      setTimeout(() => els.historyTitle.focus(), 0);
    }

    function closeModal() {
      els.saveModal.classList.remove("open");
      document.body.style.overflow = "";
    }

    async function saveCurrentHistory() {
      const title = els.historyTitle.value.trim();

      if (!title) {
        showToast("Enter a title first.", "error");
        els.historyTitle.focus();
        return;
      }

      if (!currentUser) {
        showToast("You must be signed in.", "error");
        return;
      }

      const originalText = els.modalConfirmBtn.textContent;
      els.modalConfirmBtn.disabled = true;
      els.modalConfirmBtn.textContent = "Saving...";

      try {
        await db
          .collection("users")
          .doc(currentUser.uid)
          .collection("savedHistories")
          .add({
            title,
            history: [...history],
            createdAt: firebase.firestore.FieldValue.serverTimestamp()
          });

        closeModal();
        await loadSavedHistories();
        showToast("History saved successfully.", "success");
      } catch (err) {
        console.error(err);
        showToast(err.message || "Failed to save history.", "error");
      } finally {
        els.modalConfirmBtn.disabled = false;
        els.modalConfirmBtn.textContent = originalText;
      }
    }

    async function loadSavedHistories() {
      if (!currentUser) {
        els.savedList.innerHTML = `<div class="empty">Sign in to see saved histories.</div>`;
        return;
      }

      try {
        const snapshot = await db
          .collection("users")
          .doc(currentUser.uid)
          .collection("savedHistories")
          .orderBy("createdAt", "desc")
          .get();

        if (snapshot.empty) {
          els.savedList.innerHTML = `<div class="empty">No saved histories yet.</div>`;
          return;
        }

        let html = "";
        snapshot.forEach(doc => {
          const data = doc.data();
          const count = Array.isArray(data.history) ? data.history.length : 0;

          html += `
            <div class="saved-item">
              <div class="saved-top">
                <div class="saved-info">
                  <div class="saved-title">${escapeHtml(data.title || "Untitled")}</div>
                  <div class="saved-date">${escapeHtml(formatFirestoreDate(data.createdAt))}</div>
                  <div class="saved-count">${count} entr${count === 1 ? "y" : "ies"}</div>
                </div>
                <div class="saved-actions">
                  <button class="btn mini-btn" type="button" data-action="load" data-id="${doc.id}">Load</button>
                  <button class="btn mini-btn btn-danger" type="button" data-action="delete" data-id="${doc.id}">Delete</button>
                </div>
              </div>
            </div>
          `;
        });

        els.savedList.innerHTML = html;
      } catch (err) {
        console.error(err);
        els.savedList.innerHTML = `<div class="empty">Error loading saved histories.</div>`;
      }
    }

    async function loadHistoryById(docId) {
      try {
        const docSnap = await db
          .collection("users")
          .doc(currentUser.uid)
          .collection("savedHistories")
          .doc(docId)
          .get();

        if (!docSnap.exists) {
          showToast("History not found.", "error");
          return;
        }

        const data = docSnap.data();
        history = Array.isArray(data.history) ? [...data.history] : [];
        renderHistory();
        els.calcInput.value = "";
        setResult("0");
        showToast(`Loaded "${data.title}".`, "success");
      } catch (err) {
        console.error(err);
        showToast("Failed to load history.", "error");
      }
    }

    async function deleteSavedHistory(docId) {
      if (!confirm("Delete this saved history?")) return;

      try {
        await db
          .collection("users")
          .doc(currentUser.uid)
          .collection("savedHistories")
          .doc(docId)
          .delete();

        await loadSavedHistories();
        showToast("History deleted.", "success");
      } catch (err) {
        console.error(err);
        showToast("Failed to delete history.", "error");
      }
    }

    function memoryAdd() {
      const value = Number(els.result.textContent);
      if (!Number.isNaN(value) && Number.isFinite(value)) {
        memory += value;
        updateMemoryBadge();
        showToast("Added to memory.", "success");
      }
    }

    function memorySubtract() {
      const value = Number(els.result.textContent);
      if (!Number.isNaN(value) && Number.isFinite(value)) {
        memory -= value;
        updateMemoryBadge();
        showToast("Subtracted from memory.", "success");
      }
    }

    function memoryRecall() {
      appendValue(String(memory));
    }

    function memoryClear() {
      memory = 0;
      updateMemoryBadge();
      showToast("Memory cleared.", "info");
    }

    function handleAction(action, id = null) {
      switch (action) {
        case "memory-add":
          memoryAdd();
          break;
        case "memory-subtract":
          memorySubtract();
          break;
        case "memory-recall":
          memoryRecall();
          break;
        case "memory-clear":
          memoryClear();
          break;
        case "backspace":
          backspace();
          break;
        case "clear-entry":
          clearEntry();
          break;
        case "all-clear":
          allClear();
          break;
        case "load":
          loadHistoryById(id);
          break;
        case "delete":
          deleteSavedHistory(id);
          break;
      }
    }

    auth.onAuthStateChanged(async user => {
      if (!user) {
        window.location.href = "/";
        return;
      }

      currentUser = user;
      els.userEmailDisplay.textContent = user.email || "User";
      await loadSavedHistories();
    });

    document.addEventListener("click", event => {
      const button = event.target.closest("button");
      if (!button) return;

      if (button.dataset.value) {
        appendValue(button.dataset.value);
        return;
      }

      if (button.dataset.func) {
        insertFunction(button.dataset.func);
        return;
      }

      if (button.dataset.action) {
        handleAction(button.dataset.action, button.dataset.id);
        return;
      }

      if (button.id === "calculateBtn") {
        calculate();
        return;
      }

      if (button.id === "openSaveModalBtn") {
        openModal();
        return;
      }

      if (button.id === "modalCancelBtn") {
        closeModal();
        return;
      }

      if (button.id === "modalConfirmBtn") {
        saveCurrentHistory();
        return;
      }

      if (button.id === "logoutBtn") {
        auth.signOut().then(() => {
          window.location.href = "/";
        }).catch(err => {
          console.error(err);
          showToast("Failed to sign out.", "error");
        });
      }

      const historyBtn = button.closest("[data-history-index]");
      if (historyBtn) {
        const index = Number(historyBtn.dataset.historyIndex);
        const item = history[index];
        if (item) {
          const parsed = parseHistoryItem(item);
          els.calcInput.value = parsed.expression;
          updatePreview();
          els.calcInput.focus();
        }
      }
    });

    els.calcInput.addEventListener("input", updatePreview);

    els.calcInput.addEventListener("keydown", event => {
      if (event.key === "Enter") {
        event.preventDefault();
        calculate();
      }

      if (event.key === "Escape") {
        event.preventDefault();
        allClear();
      }
    });

    els.historyTitle.addEventListener("keydown", event => {
      if (event.key === "Enter") {
        event.preventDefault();
        saveCurrentHistory();
      }

      if (event.key === "Escape") {
        closeModal();
      }
    });

    els.saveModal.addEventListener("click", event => {
      if (event.target === els.saveModal) closeModal();
    });

    renderHistory();
    updateMemoryBadge();
    updatePreview();
  </script>
</body>
</html>
