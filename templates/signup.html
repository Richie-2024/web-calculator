<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign up · #1 Calculator</title>
  <!-- Firebase SDKs -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
      background: #ffffff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }

    .signup-card {
      background: #ffffff;
      border: 1px solid #eef2f6;
      border-radius: 1.5rem;
      padding: 2rem 1.8rem;
      max-width: 440px;
      width: 100%;
      text-align: center;
    }

    .logo-icon {
      width: 52px;
      height: 52px;
      margin: 0 auto 1.2rem;
      background: #f5f7fa;
      border-radius: 1rem;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .logo-icon svg {
      width: 30px;
      height: 30px;
      stroke: #2c3e66;
      stroke-width: 1.5;
      fill: none;
    }

    h1 {
      font-size: 1.7rem;
      font-weight: 600;
      color: #111827;
      margin-bottom: 0.25rem;
    }

    .subhead {
      color: #5b6e8c;
      font-size: 0.85rem;
      margin-bottom: 1.8rem;
    }

    .form-group {
      margin-bottom: 1rem;
      text-align: left;
    }

    .form-group label {
      display: block;
      font-size: 0.75rem;
      font-weight: 500;
      color: #4a5b7a;
      margin-bottom: 0.3rem;
    }

    .form-group input {
      width: 100%;
      padding: 0.7rem 1rem;
      font-size: 0.9rem;
      border: 1px solid #e2e8f0;
      border-radius: 1rem;
      background: #ffffff;
      transition: border 0.2s;
      font-family: inherit;
    }

    .form-group input:focus {
      outline: none;
      border-color: #a0b3d9;
    }

    .signup-btn {
      background: #1f2a44;
      border: none;
      border-radius: 2rem;
      padding: 0.75rem;
      width: 100%;
      font-size: 0.9rem;
      font-weight: 500;
      color: white;
      cursor: pointer;
      transition: background 0.2s;
      margin-top: 0.5rem;
      font-family: inherit;
    }

    .signup-btn:hover {
      background: #2c3e66;
    }

    .signup-btn:disabled {
      background: #b9c2d4;
      cursor: not-allowed;
    }

    .divider {
      display: flex;
      align-items: center;
      text-align: center;
      margin: 1.5rem 0 1.2rem;
      color: #8a99b0;
      font-size: 0.75rem;
    }

    .divider::before,
    .divider::after {
      content: '';
      flex: 1;
      border-bottom: 1px solid #eef2f6;
    }

    .divider span {
      margin: 0 0.8rem;
    }

    .google-btn {
      background: white;
      border: 1px solid #e2e8f0;
      border-radius: 2rem;
      padding: 0.7rem;
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.6rem;
      font-size: 0.9rem;
      font-weight: 500;
      color: #1f2a44;
      cursor: pointer;
      transition: background 0.2s;
      font-family: inherit;
    }

    .google-btn:hover {
      background: #f9fafb;
      border-color: #cbd5e1;
    }

    .google-icon svg {
      width: 18px;
      height: 18px;
    }

    .error-message {
      background: #fef2f2;
      color: #b91c1c;
      border-radius: 2rem;
      padding: 0.5rem 1rem;
      font-size: 0.75rem;
      margin-top: 1rem;
      display: none;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    .error-message.show {
      display: flex;
    }

    .spinner {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      margin-right: 6px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .login-link {
      margin-top: 1.5rem;
      font-size: 0.8rem;
      color: #5b6e8c;
    }

    .login-link a {
      color: #1f2a44;
      text-decoration: none;
      font-weight: 500;
    }

    .login-link a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
<div class="signup-card">
  <div class="logo-icon">
    <svg viewBox="0 0 24 24" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
      <rect x="4" y="2" width="16" height="20" rx="2" ry="2"></rect>
      <line x1="8" y1="6" x2="16" y2="6"></line>
      <line x1="16" y1="14" x2="16" y2="18"></line>
      <line x1="12" y1="14" x2="12" y2="18"></line>
      <line x1="8" y1="14" x2="8" y2="18"></line>
    </svg>
  </div>
  <h1>Create account</h1>
  <div class="subhead">Start using the #1 web calculator</div>

  <div class="form-group">
    <label>Email</label>
    <input type="email" id="signupEmail" placeholder="you@example.com" autocomplete="email">
  </div>
  <div class="form-group">
    <label>Password</label>
    <input type="password" id="signupPassword" placeholder="at least 6 characters" autocomplete="new-password">
  </div>
  <button id="emailSignupBtn" class="signup-btn">Sign up with email</button>

  <div class="divider"><span>or</span></div>

  <button id="googleBtn" class="google-btn">
    <span class="google-icon">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48">
        <path fill="#FFC107" d="M43.611,20.083H42V20H24v8h11.303c-1.649,4.657-6.08,8-11.303,8c-6.627,0-12-5.373-12-12c0-6.627,5.373-12,12-12c3.059,0,5.842,1.154,7.961,3.039l5.657-5.657C34.046,6.053,29.268,4,24,4C12.955,4,4,12.955,4,24c0,11.045,8.955,20,20,20c11.045,0,20-8.955,20-20C44,22.659,43.862,21.35,43.611,20.083z" />
        <path fill="#FF3D00" d="M6.306,14.691l6.571,4.819C14.655,15.108,18.961,12,24,12c3.059,0,5.842,1.154,7.961,3.039l5.657-5.657C34.046,6.053,29.268,4,24,4C16.318,4,9.656,8.337,6.306,14.691z" />
        <path fill="#4CAF50" d="M24,44c5.166,0,9.86-1.977,13.409-5.192l-6.19-5.238C29.211,35.091,26.715,36,24,36c-5.202,0-9.619-3.317-11.283-7.946l-6.522,5.025C9.505,39.556,16.227,44,24,44z" />
        <path fill="#1976D2" d="M43.611,20.083H42V20H24v8h11.303c-0.792,2.237-2.231,4.166-4.087,5.571c0.001-0.001,0.002-0.001,0.003-0.002l6.19,5.238C36.971,39.205,44,34,44,24C44,22.659,43.862,21.35,43.611,20.083z" />
      </svg>
    </span>
    Sign up with Google
  </button>

  <div id="errorContainer" class="error-message">
    <span>⚠️</span> <span id="errorText"></span>
  </div>

  <div class="login-link">
    Already have an account? <a href="/">Log in</a>
  </div>
</div>

<script>
  const firebaseConfig = {
    apiKey: "AIzaSyACtt9csZKS2a-PaVbOSDRNC-6xh-nJUz0",
    authDomain: "calculator-4cd6b.firebaseapp.com",
    projectId: "calculator-4cd6b",
    appId: "1:648117773768:web:237871d1f5ed550fcf8cfd"
  };

  if (!firebase.apps.length) {
    firebase.initializeApp(firebaseConfig);
  }
  const auth = firebase.auth();

  const emailSignupBtn = document.getElementById('emailSignupBtn');
  const googleBtn = document.getElementById('googleBtn');
  const errorContainer = document.getElementById('errorContainer');
  const errorTextSpan = document.getElementById('errorText');

  function showError(message) {
    errorTextSpan.textContent = message;
    errorContainer.classList.add('show');
    setTimeout(() => errorContainer.classList.remove('show'), 5000);
  }

  function setButtonLoading(btn, isLoading, originalText) {
    if (isLoading) {
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span> Please wait...';
    } else {
      btn.disabled = false;
      btn.innerHTML = originalText;
    }
  }

  // After successful Firebase auth, send token to backend and redirect
  function handleUserCredential(userCredential, loadingBtn, originalText) {
    return userCredential.user.getIdToken()
      .then(token => fetch("/login_google", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ idToken: token })
      }))
      .then(response => {
        if (!response.ok) throw new Error(`Backend error (${response.status})`);
        window.location.href = "/";
      })
      .catch(err => {
        console.error(err);
        showError("Account created, but server connection failed. Please try again.");
        setButtonLoading(loadingBtn, false, originalText);
        auth.signOut();
      });
  }

  // Email signup
  emailSignupBtn.addEventListener('click', () => {
    const email = document.getElementById('signupEmail').value.trim();
    const password = document.getElementById('signupPassword').value;
    if (!email || !password) {
      showError("Please fill in all fields.");
      return;
    }
    if (password.length < 6) {
      showError("Password must be at least 6 characters.");
      return;
    }
    const originalText = emailSignupBtn.innerHTML;
    setButtonLoading(emailSignupBtn, true, originalText);
    auth.createUserWithEmailAndPassword(email, password)
      .then(userCredential => handleUserCredential(userCredential, emailSignupBtn, originalText))
      .catch(error => {
        let msg = "Signup failed. ";
        if (error.code === 'auth/email-already-in-use') msg += "Email already registered. Please log in.";
        else if (error.code === 'auth/weak-password') msg += "Password is too weak.";
        else if (error.code === 'auth/invalid-email') msg += "Invalid email address.";
        else msg += error.message;
        showError(msg);
        setButtonLoading(emailSignupBtn, false, originalText);
      });
  });

  // Google signup (same as sign-in)
  googleBtn.addEventListener('click', () => {
    const provider = new firebase.auth.GoogleAuthProvider();
    provider.setCustomParameters({ prompt: 'select_account' });
    const originalText = googleBtn.innerHTML;
    setButtonLoading(googleBtn, true, originalText);
    auth.signInWithPopup(provider)
      .then(userCredential => handleUserCredential(userCredential, googleBtn, originalText))
      .catch(error => {
        let msg = "Google sign-up failed. ";
        if (error.code === 'auth/popup-blocked') msg += "Popup was blocked.";
        else if (error.code === 'auth/network-request-failed') msg += "Network error.";
        else msg += error.message;
        showError(msg);
        setButtonLoading(googleBtn, false, originalText);
      });
  });
</script>
</body>
</html>
