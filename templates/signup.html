<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign up · #1 Calculator</title>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
      background: #f5f7fa;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }

    .card {
      background: #ffffff;
      border: 1px solid #eef2f6;
      border-radius: 1.75rem;
      padding: 2.4rem 2rem;
      max-width: 420px;
      width: 100%;
      text-align: center;
    }

    .logo-wrap {
      width: 54px;
      height: 54px;
      margin: 0 auto 1.4rem;
      background: #f5f7fa;
      border-radius: 1.1rem;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .logo-wrap svg {
      width: 28px;
      height: 28px;
      stroke: #2c3e66;
      stroke-width: 1.6;
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    h1 {
      font-size: 1.65rem;
      font-weight: 700;
      color: #111827;
      letter-spacing: -0.02em;
      margin-bottom: 0.3rem;
    }

    .subhead {
      color: #5b6e8c;
      font-size: 0.875rem;
      margin-bottom: 2rem;
      line-height: 1.5;
    }

    .form-group {
      margin-bottom: 1rem;
      text-align: left;
    }

    .form-group label {
      display: block;
      font-size: 0.78rem;
      font-weight: 600;
      color: #4a5b7a;
      margin-bottom: 0.4rem;
      letter-spacing: 0.01em;
    }

    .input-wrap {
      position: relative;
    }

    .input-wrap svg {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      width: 16px;
      height: 16px;
      stroke: #a0b3d9;
      stroke-width: 1.6;
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
      pointer-events: none;
      transition: stroke 0.2s;
    }

    .input-wrap input {
      width: 100%;
      padding: 0.72rem 1rem 0.72rem 2.5rem;
      font-size: 0.9rem;
      border: 1px solid #e2e8f0;
      border-radius: 0.85rem;
      background: #ffffff;
      color: #111827;
      transition: border-color 0.2s, box-shadow 0.2s;
      font-family: inherit;
    }

    .input-wrap input::placeholder { color: #b0bfd4; }

    .input-wrap input:focus {
      outline: none;
      border-color: #a0b3d9;
      box-shadow: 0 0 0 3px rgba(160, 179, 217, 0.18);
    }

    .input-wrap input:focus + svg,
    .input-wrap:focus-within svg { stroke: #2c3e66; }

    /* password toggle */
    .toggle-pw {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      padding: 4px;
      display: flex;
      align-items: center;
    }
    .toggle-pw svg {
      position: static;
      transform: none;
      width: 16px;
      height: 16px;
      stroke: #a0b3d9;
    }
    .toggle-pw:hover svg { stroke: #2c3e66; }

    /* strength bar */
    .strength-bar-wrap {
      margin-top: 8px;
      display: flex;
      gap: 5px;
      height: 4px;
    }
    .strength-seg {
      flex: 1;
      border-radius: 999px;
      background: #eef2f6;
      transition: background 0.3s;
    }
    .strength-seg.weak   { background: #f87171; }
    .strength-seg.fair   { background: #fbbf24; }
    .strength-seg.good   { background: #34d399; }
    .strength-seg.strong { background: #10b981; }

    .strength-label {
      margin-top: 5px;
      font-size: 0.72rem;
      color: #8a99b0;
      text-align: left;
      min-height: 14px;
    }

    .signup-btn {
      background: #1f2a44;
      border: none;
      border-radius: 2rem;
      padding: 0.8rem;
      width: 100%;
      font-size: 0.92rem;
      font-weight: 600;
      color: white;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      margin-top: 1.2rem;
      font-family: inherit;
      letter-spacing: 0.01em;
    }
    .signup-btn:hover { background: #2c3e66; }
    .signup-btn:active { transform: scale(0.99); }
    .signup-btn:disabled { background: #b9c2d4; cursor: not-allowed; transform: none; }

    /* notification banner */
    .notif {
      display: flex;
      align-items: center;
      gap: 10px;
      border-radius: 0.85rem;
      padding: 0.7rem 1rem;
      font-size: 0.82rem;
      font-weight: 500;
      margin-top: 1.1rem;
      text-align: left;
      opacity: 0;
      transform: translateY(-6px);
      transition: opacity 0.25s ease, transform 0.25s ease;
      pointer-events: none;
    }
    .notif.show { opacity: 1; transform: translateY(0); pointer-events: auto; }
    .notif.error { background: #fef2f2; color: #b91c1c; border: 1px solid #fecdd3; }
    .notif.success { background: #f0fdf4; color: #14532d; border: 1px solid #bbf7d0; }

    .notif-icon {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 700;
      flex-shrink: 0;
    }
    .notif.error .notif-icon { background: #fee2e2; color: #dc2626; }
    .notif.success .notif-icon { background: #dcfce7; color: #16a34a; }

    .spinner {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .footer-link {
      margin-top: 1.6rem;
      font-size: 0.82rem;
      color: #5b6e8c;
    }
    .footer-link a {
      color: #1f2a44;
      text-decoration: none;
      font-weight: 600;
    }
    .footer-link a:hover { text-decoration: underline; }

    @media (max-width: 480px) {
      body { padding: 1rem; align-items: flex-start; padding-top: 2rem; }
      .card { padding: 1.8rem 1.4rem; border-radius: 1.25rem; }
      h1 { font-size: 1.45rem; }
    }
  </style>
</head>
<body>
<div class="card">

  <div class="logo-wrap">
    <svg viewBox="0 0 24 24">
      <rect x="4" y="2" width="16" height="20" rx="2" ry="2"></rect>
      <line x1="8" y1="6" x2="16" y2="6"></line>
      <line x1="16" y1="14" x2="16" y2="18"></line>
      <line x1="12" y1="14" x2="12" y2="18"></line>
      <line x1="8" y1="14" x2="8" y2="18"></line>
    </svg>
  </div>

  <h1>Create account</h1>
  <p class="subhead">Start using the #1 web calculator</p>

  <div class="form-group">
    <label for="signupEmail">Email address</label>
    <div class="input-wrap">
      <input type="email" id="signupEmail" placeholder="you@example.com" autocomplete="email" />
      <svg viewBox="0 0 24 24"><rect x="2" y="4" width="20" height="16" rx="2"/><polyline points="2,4 12,13 22,4"/></svg>
    </div>
  </div>

  <div class="form-group">
    <label for="signupPassword">Password</label>
    <div class="input-wrap" style="position:relative;">
      <input type="password" id="signupPassword" placeholder="at least 6 characters" autocomplete="new-password" />
      <svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
      <button class="toggle-pw" id="togglePw" type="button" aria-label="Show password">
        <svg id="eyeIcon" viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round" fill="none" stroke-width="1.6">
          <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
          <circle cx="12" cy="12" r="3"/>
        </svg>
      </button>
    </div>
    <div class="strength-bar-wrap" id="strengthBar">
      <div class="strength-seg" id="seg1"></div>
      <div class="strength-seg" id="seg2"></div>
      <div class="strength-seg" id="seg3"></div>
      <div class="strength-seg" id="seg4"></div>
    </div>
    <div class="strength-label" id="strengthLabel"></div>
  </div>

  <button id="signupBtn" class="signup-btn" type="button">Create account</button>

  <div id="notif" class="notif error">
    <div class="notif-icon" id="notifIcon">!</div>
    <span id="notifText"></span>
  </div>

  <p class="footer-link">Already have an account? <a href="/">Log in</a></p>
</div>

<script>
  const firebaseConfig = {
    apiKey: "AIzaSyACtt9csZKS2a-PaVbOSDRNC-6xh-nJUz0",
    authDomain: "calculator-4cd6b.firebaseapp.com",
    projectId: "calculator-4cd6b",
    appId: "1:648117773768:web:237871d1f5ed550fcf8cfd"
  };
  if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();

  const signupBtn  = document.getElementById("signupBtn");
  const emailInput = document.getElementById("signupEmail");
  const pwInput    = document.getElementById("signupPassword");
  const notif      = document.getElementById("notif");
  const notifText  = document.getElementById("notifText");
  const notifIcon  = document.getElementById("notifIcon");
  const togglePw   = document.getElementById("togglePw");
  const eyeIcon    = document.getElementById("eyeIcon");

  let notifTimer;

  function showNotif(message, type = "error") {
    clearTimeout(notifTimer);
    notifText.textContent = message;
    notif.className = `notif ${type}`;
    notifIcon.textContent = type === "success" ? "✓" : "!";
    notif.classList.add("show");
    notifTimer = setTimeout(() => notif.classList.remove("show"), 5000);
  }

  /* password visibility toggle */
  togglePw.addEventListener("click", () => {
    const show = pwInput.type === "password";
    pwInput.type = show ? "text" : "password";
    eyeIcon.innerHTML = show
      ? `<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/>`
      : `<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>`;
  });

  /* password strength */
  const segs   = [1,2,3,4].map(n => document.getElementById(`seg${n}`));
  const labels = ["", "Weak", "Fair", "Good", "Strong"];
  const colors = ["", "weak", "fair", "good", "strong"];

  function getStrength(pw) {
    if (!pw) return 0;
    let score = 0;
    if (pw.length >= 6)  score++;
    if (pw.length >= 10) score++;
    if (/[A-Z]/.test(pw) && /[a-z]/.test(pw)) score++;
    if (/[0-9]/.test(pw) && /[^A-Za-z0-9]/.test(pw)) score++;
    return Math.min(score, 4);
  }

  pwInput.addEventListener("input", () => {
    const score = getStrength(pwInput.value);
    segs.forEach((seg, i) => {
      seg.className = "strength-seg";
      if (i < score) seg.classList.add(colors[score]);
    });
    document.getElementById("strengthLabel").textContent = pwInput.value ? labels[score] : "";
  });

  /* signup */
  signupBtn.addEventListener("click", () => {
    const email    = emailInput.value.trim();
    const password = pwInput.value;

    if (!email || !password) { showNotif("Please fill in all fields."); return; }
    if (password.length < 6) { showNotif("Password must be at least 6 characters."); return; }

    const originalHTML = signupBtn.innerHTML;
    signupBtn.disabled = true;
    signupBtn.innerHTML = '<span class="spinner"></span>Creating account…';

    auth.createUserWithEmailAndPassword(email, password)
      .then(cred => cred.user.getIdToken())
      .then(token => fetch("/login_google", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ idToken: token })
      }))
      .then(res => {
        if (!res.ok) throw new Error(`Server error (${res.status})`);
        showNotif("Account created! Redirecting…", "success");
        setTimeout(() => { window.location.href = "/"; }, 1000);
      })
      .catch(err => {
        const code = err.code || "";
        let msg = "Signup failed. ";
        if (code === "auth/email-already-in-use") msg = "That email is already registered. Try logging in.";
        else if (code === "auth/weak-password")   msg = "Password is too weak. Try adding numbers or symbols.";
        else if (code === "auth/invalid-email")   msg = "That doesn't look like a valid email address.";
        else msg += err.message;
        showNotif(msg);
        signupBtn.disabled = false;
        signupBtn.innerHTML = originalHTML;
        auth.signOut();
      });
  });

  /* allow Enter key to submit */
  [emailInput, pwInput].forEach(el => {
    el.addEventListener("keydown", e => { if (e.key === "Enter") signupBtn.click(); });
  });
</script>
</body>
</html>
