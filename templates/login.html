<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login · #1 Calculator</title>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
      background: #f5f7fa;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }

    .card {
      background: #ffffff;
      border: 1px solid #eef2f6;
      border-radius: 1.75rem;
      padding: 2.4rem 2rem;
      max-width: 420px;
      width: 100%;
      text-align: center;
    }

    .logo-wrap {
      width: 54px;
      height: 54px;
      margin: 0 auto 1.4rem;
      background: #f5f7fa;
      border-radius: 1.1rem;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .logo-wrap svg {
      width: 28px;
      height: 28px;
      stroke: #2c3e66;
      stroke-width: 1.6;
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    h1 {
      font-size: 1.65rem;
      font-weight: 700;
      color: #111827;
      letter-spacing: -0.02em;
      margin-bottom: 0.3rem;
    }
    .subhead {
      color: #5b6e8c;
      font-size: 0.875rem;
      margin-bottom: 2rem;
      line-height: 1.5;
    }

    .form-group { margin-bottom: 1rem; text-align: left; }
    .form-group label {
      display: block;
      font-size: 0.78rem;
      font-weight: 600;
      color: #4a5b7a;
      margin-bottom: 0.4rem;
      letter-spacing: 0.01em;
    }

    .input-wrap { position: relative; }
    .input-wrap .field-icon {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      width: 16px;
      height: 16px;
      stroke: #a0b3d9;
      stroke-width: 1.6;
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
      pointer-events: none;
      transition: stroke 0.2s;
    }
    .input-wrap:focus-within .field-icon { stroke: #2c3e66; }

    .input-wrap input {
      width: 100%;
      padding: 0.72rem 1rem 0.72rem 2.5rem;
      font-size: 0.9rem;
      border: 1px solid #e2e8f0;
      border-radius: 0.85rem;
      background: #ffffff;
      color: #111827;
      transition: border-color 0.2s, box-shadow 0.2s;
      font-family: inherit;
    }
    .input-wrap input::placeholder { color: #b0bfd4; }
    .input-wrap input:focus {
      outline: none;
      border-color: #a0b3d9;
      box-shadow: 0 0 0 3px rgba(160, 179, 217, 0.18);
    }

    .toggle-pw {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      padding: 4px;
      display: flex;
      align-items: center;
    }
    .toggle-pw svg {
      width: 16px;
      height: 16px;
      stroke: #a0b3d9;
      stroke-width: 1.6;
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
      transition: stroke 0.2s;
    }
    .toggle-pw:hover svg { stroke: #2c3e66; }

    .forgot-row {
      text-align: right;
      margin-top: -0.4rem;
      margin-bottom: 0.6rem;
    }
    .forgot-row a {
      font-size: 0.78rem;
      color: #5b6e8c;
      text-decoration: none;
      font-weight: 500;
    }
    .forgot-row a:hover { color: #1f2a44; text-decoration: underline; }

    .login-btn {
      background: #1f2a44;
      border: none;
      border-radius: 2rem;
      padding: 0.8rem;
      width: 100%;
      font-size: 0.92rem;
      font-weight: 600;
      color: white;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      font-family: inherit;
      letter-spacing: 0.01em;
    }
    .login-btn:hover { background: #2c3e66; }
    .login-btn:active { transform: scale(0.99); }
    .login-btn:disabled { background: #b9c2d4; cursor: not-allowed; transform: none; }

    .divider {
      display: flex;
      align-items: center;
      gap: 0.7rem;
      margin: 1.2rem 0;
      color: #b0bfd4;
      font-size: 0.78rem;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: #eef2f6;
    }

    .google-btn {
      width: 100%;
      padding: 0.75rem;
      border-radius: 2rem;
      border: 1px solid #e2e8f0;
      background: #ffffff;
      font-family: inherit;
      font-size: 0.9rem;
      font-weight: 500;
      color: #1a2035;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.6rem;
      transition: border-color 0.2s, background 0.2s, transform 0.1s;
    }
    .google-btn:hover { background: #f7f8fc; border-color: #c5cdd8; }
    .google-btn:active { transform: scale(0.99); }
    .google-btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
    .google-btn .g-icon { width: 18px; height: 18px; flex-shrink: 0; }

    /* notification banner */
    .notif {
      display: flex;
      align-items: center;
      gap: 10px;
      border-radius: 0.85rem;
      padding: 0.7rem 1rem;
      font-size: 0.82rem;
      font-weight: 500;
      margin-top: 1.1rem;
      text-align: left;
      opacity: 0;
      transform: translateY(-6px);
      transition: opacity 0.25s ease, transform 0.25s ease;
      pointer-events: none;
    }
    .notif.show { opacity: 1; transform: translateY(0); pointer-events: auto; }
    .notif.error   { background: #fef2f2; color: #b91c1c; border: 1px solid #fecdd3; }
    .notif.success { background: #f0fdf4; color: #14532d; border: 1px solid #bbf7d0; }

    .notif-icon {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 700;
      flex-shrink: 0;
    }
    .notif.error   .notif-icon { background: #fee2e2; color: #dc2626; }
    .notif.success .notif-icon { background: #dcfce7; color: #16a34a; }

    .spinner {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid rgba(255,255,255,0.35);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }
    .spinner.dark {
      border-color: rgba(31,42,68,0.2);
      border-top-color: #1f2a44;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .footer-link {
      margin-top: 1.6rem;
      font-size: 0.82rem;
      color: #5b6e8c;
    }
    .footer-link a {
      color: #1f2a44;
      text-decoration: none;
      font-weight: 600;
    }
    .footer-link a:hover { text-decoration: underline; }

    @media (max-width: 480px) {
      body { padding: 1rem; align-items: flex-start; padding-top: 2rem; }
      .card { padding: 1.8rem 1.4rem; border-radius: 1.25rem; }
      h1 { font-size: 1.45rem; }
    }
  </style>
</head>
<body>
<div class="card">

  <div class="logo-wrap">
    <svg viewBox="0 0 24 24">
      <rect x="4" y="2" width="16" height="20" rx="2" ry="2"></rect>
      <line x1="8" y1="6" x2="16" y2="6"></line>
      <line x1="16" y1="14" x2="16" y2="18"></line>
      <line x1="12" y1="14" x2="12" y2="18"></line>
      <line x1="8" y1="14" x2="8" y2="18"></line>
    </svg>
  </div>

  <h1>Welcome back</h1>
  <p class="subhead">Log in to your calculator account</p>

  <div class="form-group">
    <label for="loginEmail">Email address</label>
    <div class="input-wrap">
      <input type="email" id="loginEmail" placeholder="you@example.com" autocomplete="email" />
      <svg class="field-icon" viewBox="0 0 24 24"><rect x="2" y="4" width="20" height="16" rx="2"/><polyline points="2,4 12,13 22,4"/></svg>
    </div>
  </div>

  <div class="form-group">
    <label for="loginPassword">Password</label>
    <div class="input-wrap">
      <input type="password" id="loginPassword" placeholder="your password" autocomplete="current-password" />
      <svg class="field-icon" viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
      <button class="toggle-pw" id="togglePw" type="button" aria-label="Show password">
        <svg id="eyeIcon" viewBox="0 0 24 24">
          <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
          <circle cx="12" cy="12" r="3"/>
        </svg>
      </button>
    </div>
  </div>

  <!-- <div class="forgot-row"><a href="/forgot-password">Forgot password?</a></div> -->

  <button id="loginBtn" class="login-btn" type="button">Log in</button>
    <p class="footer-link">Don't have an account? <a href="/signup">Sign up</a></p>


  <div class="divider">or</div>

  <button id="googleBtn" class="google-btn" type="button">
    <svg class="g-icon" viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
      <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
      <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
      <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
      <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.36-8.16 2.36-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
    </svg>
    Sign in with Google
  </button>

  <div id="notif" class="notif error">
    <div class="notif-icon" id="notifIcon">!</div>
    <span id="notifText"></span>
  </div>

  <p class="footer-link"> Web Calcular@2026<a href="/signup"></a></p>
</div>

<script>
  const firebaseConfig = {
    apiKey: "AIzaSyACtt9csZKS2a-PaVbOSDRNC-6xh-nJUz0",
    authDomain: "calculator-4cd6b.firebaseapp.com",
    projectId: "calculator-4cd6b",
    appId: "1:648117773768:web:237871d1f5ed550fcf8cfd"
  };
  if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();

  const loginBtn   = document.getElementById("loginBtn");
  const googleBtn  = document.getElementById("googleBtn");
  const emailInput = document.getElementById("loginEmail");
  const pwInput    = document.getElementById("loginPassword");
  const notif      = document.getElementById("notif");
  const notifText  = document.getElementById("notifText");
  const notifIcon  = document.getElementById("notifIcon");
  const togglePw   = document.getElementById("togglePw");
  const eyeIcon    = document.getElementById("eyeIcon");

  let notifTimer;

  function showNotif(message, type = "error") {
    clearTimeout(notifTimer);
    notifText.textContent = message;
    notif.className = `notif ${type}`;
    notifIcon.textContent = type === "success" ? "✓" : "!";
    notif.classList.add("show");
    if (type !== "success") {
      notifTimer = setTimeout(() => notif.classList.remove("show"), 5000);
    }
  }

  function hideNotif() { notif.classList.remove("show"); }

  /* password toggle */
  togglePw.addEventListener("click", () => {
    const show = pwInput.type === "password";
    pwInput.type = show ? "text" : "password";
    eyeIcon.innerHTML = show
      ? `<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/>`
      : `<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>`;
  });

  function sendToken(token) {
    return fetch("/login_google", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ idToken: token })
    }).then(res => {
      if (!res.ok) throw new Error(`Server error (${res.status})`);
      showNotif("Login successful! Redirecting…", "success");
      setTimeout(() => { window.location.href = "/dashboard"; }, 900);
    });
  }

  /* email login */
  loginBtn.addEventListener("click", () => {
    const email    = emailInput.value.trim();
    const password = pwInput.value;

    if (!email || !password) { showNotif("Please enter your email and password."); return; }

    const originalHTML = loginBtn.innerHTML;
    loginBtn.disabled = true;
    loginBtn.innerHTML = '<span class="spinner"></span>Logging in…';
    hideNotif();

    auth.signInWithEmailAndPassword(email, password)
      .then(cred => cred.user.getIdToken())
      .then(sendToken)
      .catch(err => {
        const code = err.code || "";
        let msg = "Login failed. ";
        if (code === "auth/user-not-found")    msg = "No account found with that email.";
        else if (code === "auth/wrong-password") msg = "Incorrect password. Please try again.";
        else if (code === "auth/invalid-email")  msg = "That doesn't look like a valid email.";
        else if (code === "auth/too-many-requests") msg = "Too many attempts. Please try again later.";
        else msg += err.message;
        showNotif(msg);
        loginBtn.disabled = false;
        loginBtn.innerHTML = originalHTML;
      });
  });

  /* google login */
  googleBtn.addEventListener("click", () => {
    const provider = new firebase.auth.GoogleAuthProvider();
    provider.setCustomParameters({ prompt: "select_account" });

    const originalHTML = googleBtn.innerHTML;
    googleBtn.disabled = true;
    googleBtn.innerHTML = '<span class="spinner dark"></span>Connecting…';
    hideNotif();

    auth.signInWithPopup(provider)
      .then(cred => cred.user.getIdToken())
      .then(sendToken)
      .catch(err => {
        const code = err.code || "";
        let msg = "Google sign-in failed. ";
        if (code === "auth/popup-blocked")          msg = "Popup was blocked. Please allow popups and try again.";
        else if (code === "auth/popup-closed-by-user") msg = "Sign-in was cancelled.";
        else if (code === "auth/network-request-failed") msg = "Network error. Check your connection.";
        else msg += err.message;
        showNotif(msg);
        googleBtn.disabled = false;
        googleBtn.innerHTML = originalHTML;
      });
  });

  /* Enter key submits */
  [emailInput, pwInput].forEach(el => {
    el.addEventListener("keydown", e => { if (e.key === "Enter") loginBtn.click(); });
  });
</script>
</body>
</html>
